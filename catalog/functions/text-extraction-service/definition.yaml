name: text-extraction-service
kind: project
metadata:
  name: Text Extraction Service (Project)
  project: tika
  version: 1.0.0
  description: This project demonstrates how to deploy a text extraction service using Apache Tika in a container and a Python function to interact with it, all orchestrated within the DigitalHub platform.
  labels:
    - "license:apache-2.0"
    - "platform:0.14"
    - "type:service"
    - "phase:utility"    
kind: python+serve
name: tika
spec:
  functions:
    - kind: container
      metadata:
        name: tika
        project: tika
        labels:
          - "license:apache-2.0"
          - "domain:nlp"
          - "platform:0.14"
          - "type:service"
          - "phase:data-preparation"            
      name: tika
      spec:
        image: apache/tika:latest-full
    - kind: python
      metadata:
        name: extract
        project: tika
        labels:
          - "license:apache-2.0"
          - "platform:0.14"
          - "type:job"
          - "phase:utility"  
      name: extract
      project: tika
      spec:
        python_version: PYTHON3_10
      source:
        base64: 
        lang: python

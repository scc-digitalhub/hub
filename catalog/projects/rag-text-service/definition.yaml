name: rag-text-serve
kind: project
metadata:
  name: RAG Text Service (Project)
  project: rag-text-serve
  version: 1.0.0
  description: This project demonstrates how to deploy a RAG text serving function using a Python function within the DigitalHub platform, which interacts with a VLLMServe text serving function and an embedding function to provide retrieval-augmented generation capabilities.
  labels:
    - "license:apache-2.0"
    - "platform:0.14"
    - "type:service"
    - "phase:utility"    
kind: python+serve
name: rag-text-serve
spec:
  functions:
    - kind: vllmserve-text
      metadata:
        name: LLM VLLM Serve (vllmserve-text)
        project: rag-text-serve
        description: This function demonstrates how to deploy and interact with the VLLM model using the openAI Text Serving framework inside the DigitalHub platform.
        labels:
          - "license:apache-2.0"
          - "platform:0.14"
          - "type:service"
          - "phase:model-serving"
          - "inference:openai"
      name: vllm-text-serve
      python_version: PYTHON3_10
      spec:
        model_name: model
        url: hf://Qwen/Qwen2.5-0.5B-Instruct
    - kind: kubeai-text
      metadata:
        name: embed
        project: rag-text-serve
        labels:
          - "license:apache-2.0"
          - "platform:0.14"
          - "type:service"
          - "phase:model-serving"
          - "inference:openai"
      name: embed
      project: rag-service
      spec:
        features:
          - TextEmbedding
        model_name: embmodel
        engine: VLLM
        url: hf://thenlper/gte-base
    - kind: python
      metadata:
        name: embedder
        project: rag-text-serve
        labels:
          - "license:apache-2.0"
          - "platform:0.14"
          - "type:job"
          - "phase:utility"
      name: embedder
      project: rag-text-serve
      spec:
        requirements:
          - transformers==4.50.3
          - psycopg[binary]==3.2.10
          - openai==1.109.1
          - langchain==0.3.27
          - langchain-core==0.3.76
          - langchain-openai==0.3.27
          - langchain_postgres==0.0.15
          - langchain-huggingface==0.3.1
          - langgraph==0.6.7
          - filelock==3.19.1
          - huggingface-hub==0.35.1
          - beautifulsoup4>=4.13.0
          - langchainhub==0.1.21
        python_version: PYTHON3_10
        source:
          base64: 
          lang: python
    - kind: python
      metadata:
        name: rag-service
        project: rag-text-serve
        labels:
          - "license:apache-2.0"
          - "platform:0.14"
          - "type:service"
          - "phase:utility"      
      name: rag-service
      project: rag-text-serve
      spec:
        requirements:
          - transformers==4.50.3
          - psycopg[binary]==3.2.10
          - openai==1.109.1
          - langchain==0.3.27
          - langchain-core==0.3.76
          - langchain-openai==0.3.27
          - langchain-postgres==0.0.15
          - langchain-huggingface==0.3.1
          - langgraph==0.6.7
          - filelock==3.19.1
          - huggingface-hub==0.35.1
          - beautifulsoup4>=4.13.0
          - langchainhub==0.1.21
        python_version: PYTHON3_10
        source:
          source: src/serve.py
          handler: src.serve:serve
          base64: 
          lang: python
          init_function: init

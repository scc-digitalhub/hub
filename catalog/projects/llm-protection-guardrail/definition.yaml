name: llm-protection-guardrail
kind: project
metadata:
  name: LLM Protection Guardrail (Project)
  version: 1.0.0
  description: This project shows how to protect LLMs with Guardrails using the digital hub platform Envoy Gateway infrastructure configured for guardrails management. The platform Envoy Gateway provides a robust framework for implementing guardrails in LLM applications.
  labels:
    - "license:apache-2.0"
    - "platform:0.15"
    - "type:service"
    - "phase:utility"
    - "framework:guardrail"
name: llm-protection-guardrail
spec:
  functions:
    - kind: kubeai-text
      metadata:
        name: llm
        labels:
          - "license:apache-2.0"
          - "platform:0.15"
          - "type:service"
          - "phase:model-serving"
          - "inference:openai"
      name: llm
      spec:
        features:
          - TextGeneration
        model_name: gemma3
        engine: OLlama
        url: ollama://gemma3:latest
    - kind: guardrail
      metadata:
        name: toxic-guardrail
        labels:
          - "license:apache-2.0"
          - "platform:0.15"
          - "type:service"
          - "phase:utility"
          - "framework:guardrail"
      name: toxic-guardrail          
      spec:
        requirements:
          - guardrails-ai==0.5.0
          - transformers==4.42.0
        python_version: PYTHON3_10
        processing_mode: preprocessor
        source:
          handler: handler_serve
          base64: 
          lang: python
          init_function: init_context

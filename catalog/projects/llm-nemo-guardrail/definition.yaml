name: llm-nemo-guardrail
kind: project
metadata:
  name: LLM Nemo Guardrail (Project)
  version: 1.0.0
  description: This project provides a guardrail for LLMs using Nemo Guardrails. It includes a function for serving a language model (LLM) and a containerized function for the Nemo Guardrail framework. The LLM function serves the Gemma3 model using the OLlama engine, while the Nemo Guardrail function provides a utility for implementing guardrails in LLM applications. This project is designed to enhance the safety and reliability of LLM deployments by integrating guardrail mechanisms.
  labels:
    - "license:apache-2.0"
    - "platform:0.15"
    - "type:service"
    - "phase:utility"
    - "framework:guardrail"
name: llm-nemo-guardrail
spec:
  functions:
    - kind: kubeai-text
      metadata:
        name: llm
        labels:
          - "license:apache-2.0"
          - "platform:0.15"
          - "type:service"
          - "phase:model-serving"
          - "inference:openai"
      name: llm
      spec:
        features:
          - TextGeneration
        model_name: gemma3
        engine: OLlama
        url: ollama://gemma3:latest
    - kind: container
      metadata:
        name: nemo-guardrail
        labels:
          - "license:apache-2.0"
          - "platform:0.15"
          - "type:service"
          - "phase:utility"
          - "framework:guardrail"
      name: nemo-guardrail          
      spec:
        image: ghcr.io/scc-digitalhub/digitalhub-nemoguardrails:0.21.0-rootless  

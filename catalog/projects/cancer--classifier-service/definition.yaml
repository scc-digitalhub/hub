name: cancer-classifier-service
kind: project
metadata:
  name: Cancer Classifier Service (Project)
  project: cancer-classifier
  version: 1.0.0
  description: This project demonstrates how to train and deploy a cancer classification service based on the BERT model. The model is deployed as a service to assist with automated annotation and classification of official documents. It exposes an API using the "serve" task.
  labels:
    - "license:apache-2.0"
    - "platform:0.14"
    - "type:service"
    - "phase:utility"    
name: cancer-classifier-service
spec:
  functions:
    - kind: sklearnserve
      description: Cancer Classifier Sklearn Serve With MLFlow. The model is deployed as a service to assist with automated annotation and classification of official documents. It exposes an API using the "serve" task. Digital workers can utilize this API to classify documents based on their content, enabling efficient document management and retrieval. The model is trained on a dataset of official documents and can classify them into predefined categories, improving the organization and accessibility of information. "Digital health workers can leverage this service to enhance their document processing workflows, ensuring accurate and timely classification of official documents.
      labels:
      - "license:apache-2.0"
      - "platform:0.14"
      - "type:service"
      - "phase:model-serving"
      - "framework:sklearn"
      - "inference:custom"
      name: cancer-classifier-service
      path: store://cancer-classifier/model/sklearn/cancer_classifier
    - kind: python
      metadata:
        name: cancer-classifier-train
        project: cancer-classifier
        labels:
           - "license:apache-2.0"
           - "platform:0.14"
           - "type:job"
           - "phase:model-training"
           - "framework:sklearn"
           - "application:healthcare"
        project: cancer-classifier
      name: cancer-classifier-train
      spec:
        python_version: PYTHON3_10
        requirements:
          - scikit-learn==1.2.2
          - numpy<2
        source:
          handler: breast_cancer_generator
          base64: 
          lang: python  
